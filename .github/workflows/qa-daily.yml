name: Daily QA

# Runs every morning at 7am CT (12:00 UTC winter / 13:00 UTC summer)
# against the live production site. If anything fails, opens (or updates)
# a GitHub issue tagged `qa-failure` with the report attached as an artifact.
#
# Trigger manually: Actions → Daily QA → Run workflow.

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to check (defaults to prod)'
        required: false
        default: 'https://geauxfind.com'

permissions:
  contents: read
  issues: write

jobs:
  qa:
    name: Spot-check production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install chromium --only-shell

      - name: Run QA against production
        id: qa
        run: |
          set +e
          node scripts/qa-check.mjs --url=${{ inputs.url || 'https://geauxfind.com' }}
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: data/qa-report.json
          retention-days: 30

      - name: Open issue on failure
        if: steps.qa.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('data/qa-report.json', 'utf8'));
            const issuesByPage = {};
            for (const i of report.issues) {
              issuesByPage[i.page] = issuesByPage[i.page] || [];
              issuesByPage[i.page].push(`- **${i.category}**: ${i.detail}`);
            }
            const body = [
              `Daily QA against \`${report.base}\` failed at ${report.timestamp}.`,
              ``,
              `**${report.failed} of ${report.totalChecks} checks failed.**`,
              ``,
              ...Object.entries(issuesByPage).flatMap(([page, lines]) => [
                `### \`${page}\``,
                ...lines,
                ``,
              ]),
              `Full report: see the \`qa-report\` artifact on this run.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Find existing open qa-failure issue and update it instead of opening new ones
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'qa-failure',
              per_page: 5,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              console.log(`Updated existing issue #${issues[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[QA] ${report.failed} checks failed on ${new Date(report.timestamp).toISOString().slice(0,10)}`,
                body,
                labels: ['qa-failure'],
              });
              console.log(`Opened issue #${created.number}`);
            }

      - name: Close stale qa-failure issues if all green
        if: steps.qa.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'qa-failure',
              per_page: 10,
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ All QA checks passing as of ${new Date().toISOString()}. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Fail the run if QA found issues
        if: steps.qa.outputs.exit_code != '0'
        run: exit 1
